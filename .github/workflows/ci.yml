name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./...
      - run: gofmt -l . | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go build -ldflags="-s -w" -o /tmp/vps-health .
      - run: /tmp/vps-health --version
